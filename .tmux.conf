set -g default-terminal "screen-256color"
set -gu terminal-overrides
set -gu terminal-features
set -gu update-environment
set -g terminal-features[0] "xterm*:clipboard:ccolour:cstyle:focus:title"
set -g terminal-features[1] "screen*:title"
set -g terminal-features[2] "rxvt*:ignorefkeys"
set -g terminal-features[3] "xterm-ghostty*:RGB:cstyle"
set -g terminal-features[4] "ghostty*:RGB:cstyle"
set -g update-environment[0] DISPLAY
set -g update-environment[1] KRB5CCNAME
set -g update-environment[2] MSYSTEM
set -g update-environment[3] SSH_ASKPASS
set -g update-environment[4] SSH_AUTH_SOCK
set -g update-environment[5] SSH_AGENT_PID
set -g update-environment[6] SSH_CONNECTION
set -g update-environment[7] WINDOWID
set -g update-environment[8] XAUTHORITY
set -g update-environment[9] GHOSTTY_BIN_DIR
set -g update-environment[10] GHOSTTY_RESOURCES_DIR
set -g update-environment[11] GHOSTTY_SHELL_FEATURES
set -g update-environment[12] TERM_PROGRAM
set -g update-environment[13] TERM_PROGRAM_VERSION
set -g update-environment[14] TERMINFO
set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10

# Make the active pane obvious.
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour114,bold
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=colour235,bg=colour114,bold] #P #{pane_title} #[default],#[fg=colour246,bg=colour236] #P #{pane_title} #[default]}"
set -g display-panes-colour colour244
set -g display-panes-active-colour colour114
bind -n MouseDown1Pane select-pane -t=

# Use backtick as prefix instead of Ctrl-b.
unbind C-b
set -g prefix `
bind ` send-prefix

# Vim-style pane movement with prefix + hjkl.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style window movement with prefix + Shift-h/l.
bind H previous-window
bind L next-window

# Splits keep the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Status line.
set -g status-style bg=colour235,fg=colour250
set -g status-left-style fg=colour81,bold
set -g status-left "#S #[fg=colour244]#I:#P #[fg=colour114]#{pane_title} "
set -g status-right-style fg=colour244
set -g status-right "%Y-%m-%d %H:%M "
setw -g window-status-current-style fg=colour114,bold
