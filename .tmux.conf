set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 100000
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10

# Use backtick as prefix instead of Ctrl-b.
unbind C-b
set -g prefix `
bind ` send-prefix

# Vim-style pane movement with prefix + hjkl.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style window movement with prefix + Shift-h/l.
bind H previous-window
bind L next-window

# Splits keep the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Status line.
set -g status-style bg=colour235,fg=colour250
set -g status-left-style fg=colour81,bold
set -g status-left "#S "
set -g status-right-style fg=colour244
set -g status-right "%Y-%m-%d %H:%M "
setw -g window-status-current-style fg=colour114,bold
